<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione Professore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Registrazione Professore</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Matricola</label><input type="text" class="form-control" name="matricola" required></div>
        <div class="mb-3"><label class="form-label">Nome</label><input type="text" class="form-control" name="nome" required></div>
        <div class="mb-3"><label class="form-label">Cognome</label><input type="text" class="form-control" name="cognome" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" name="password" required></div>
        <div class="mb-3"><label class="form-label">Dipartimento</label><input type="text" class="form-control" name="dipartimento" required></div>
        <div class="mb-3"><label class="form-label">Materia</label><input type="text" class="form-control" name="materia" required></div>
        <button type="submit" class="btn btn-primary">Registrati</button>
    </form>
</div>

</body>
</html>
