<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Registrazione Utente</h2>
    {% if errore %}
        <div class="alert alert-danger">{{ errore }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="matricola" class="form-label">Matricola</label>
            <input type="text" class="form-control" id="matricola" name="matricola" required>
        </div>
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" name="nome" required>
        </div>
        <div class="mb-3">
            <label for="cognome" class="form-label">Cognome</label>
            <input type="text" class="form-control" id="cognome" name="cognome" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo utente</label>
            <select class="form-select" id="tipo" name="tipo" required onchange="toggleCampi(this.value)">
                <option value="">Seleziona...</option>
                <option value="professore">Professore</option>
                <option value="studente">Studente</option>
                <option value="tecnico">Tecnico</option>
            </select>
        </div>

        <div id="campi_professore" style="display:none">
            <div class="mb-3">
                <label class="form-label">Dipartimento</label>
                <input type="text" class="form-control" name="dipartimento">
            </div>
            <div class="mb-3">
                <label class="form-label">Materia</label>
                <input type="text" class="form-control" name="materia">
            </div>
        </div>

        <div id="campi_studente" style="display:none">
            <div class="mb-3">
                <label class="form-label">Corso di Laurea</label>
                <input type="text" class="form-control" name="corso_laurea">
            </div>
            <div class="mb-3">
                <label class="form-label">Anno</label>
                <input type="number" class="form-control" name="anno">
            </div>
        </div>

        <div id="campi_tecnico" style="display:none">
            <div class="mb-3">
                <label class="form-label">Area di Competenza</label>
                <input type="text" class="form-control" name="area_competenza">
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="responsabile_laboratorio" id="responsabile">
                <label class="form-check-label" for="responsabile">Responsabile Laboratorio</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3">Registrati</button>
    </form>
</div>

<script>
    function toggleCampi(valore) {
        document.getElementById('campi_professore').style.display = 'none';
        document.getElementById('campi_studente').style.display = 'none';
        document.getElementById('campi_tecnico').style.display = 'none';

        if (valore === 'professore') {
            document.getElementById('campi_professore').style.display = 'block';
        } else if (valore === 'studente') {
            document.getElementById('campi_studente').style.display = 'block';
        } else if (valore === 'tecnico') {
            document.getElementById('campi_tecnico').style.display = 'block';
        }
    }
</script>

</body>
</html>
