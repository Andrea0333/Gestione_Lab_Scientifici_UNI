<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Crea Progetto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2>Crea Nuovo Progetto Sperimentale</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Titolo</label>
            <input type="text" class="form-control" name="titolo" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Descrizione</label>
            <textarea class="form-control" name="descrizione" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Obiettivi</label>
            <textarea class="form-control" name="obiettivi" rows="2" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Data Inizio</label>
            <input type="date" class="form-control" name="data_inizio" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Data Fine</label>
            <input type="date" class="form-control" name="data_fine" required>
        </div>
        <button type="submit" class="btn btn-primary">Crea Progetto</button>
        <a href="{% url 'dashboard_professore' %}" class="btn btn-secondary ms-2">Annulla</a>
    </form>
</div>
</body>
</html>
